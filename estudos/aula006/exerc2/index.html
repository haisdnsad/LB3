<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container">
        <div class="row">
            <form action="SAE.php" method="post">
                <fieldset>
                    <legend>Sistema de Aprovação Escolar</legend>
                    <label for="In1">1° nota: </label>
                    <input type="number" name="Nota1" id="In1" max="10" min="0" step=".1">
                    <label for="In2">2° nota: </label>
                    <input type="number" name="Nota2" id="In2" max="10" min="0" step=".1">
                    <label for="In3">3° nota: </label>
                    <input type="number" name="Nota3" id="In3" max="10" min="0" step=".1">
                    <label for="Ifreq">Frequência: </label>
                    <input type="number" name="Freq" id="Ifreq" max="100" min="0" step="any">
                </fieldset>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>
        <div class="row">
            <form action="CTEE.php" method="post">
                <fieldset>
                    <legend>Calculadora de Tarifas de Energia Elétrica</legend>
                    <label for="Ikwh">kWh consumidos:</label>
                    <input type="number" name="kWh" id="Ikwh" step="any">
                    <label for="Iimovel">instalação do imóvel</label>
                    <select name="imovel" id="Iimovel">
                        <option value="R">Residencial</option>
                        <option value="C">Comercial </option>
                        <option value="I">Industrial </option>
                    </select>
                </fieldset>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>
        <div class="row">
            <form action="SDE.php" method="post">
                <fieldset>
                    <legend>Sistema de Descontos para E-commerce</legend>
                    <label for="Icompra">Valor da compra: </label>
                    <input type="number" name="compra" id="Icompra" step=".01">
                    <label for="Icate">Sua categoria:</label>
                    <select name="categoria" id="Icate">
                        <option value="C">Cliente comum</option>
                        <option value="V">Cliente VIP</option>
                        <option value="P">Cliente Premium</option>
                    </select>
                </fieldset>
                <button type="submit">Enviar</button>
                <button type="reset">Limpar</button>
            </form>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
